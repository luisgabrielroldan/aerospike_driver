service {
	cluster-name docker
}

logging {
	console {
		context any info
	}
}

network {
	service {
		address any
		port 3000
	}

	heartbeat {
		mode mesh
		address any
		port 3002
		mesh-seed-address-port aerospike1 3002
		mesh-seed-address-port aerospike2 3002
		mesh-seed-address-port aerospike3 3002
		interval 150
		timeout 10
	}

	fabric {
		address any
		port 3001
	}
}

namespace test {
	# Single docker-compose node (aerospike1 only): RF>1 causes mesh warnings and can
	# reject some write paths. Use RF=1 for local dev; enable profile `cluster` for RF>1.
	replication-factor 1
	nsup-period 120
	default-ttl 0

	storage-engine device {
		file /opt/aerospike/data/test.dat
		filesize 4G
		read-page-cache true
	}
}
