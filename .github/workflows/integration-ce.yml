name: Integration

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  integration-ce:
    name: Community Edition Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.2"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}-${{ hashFiles('mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Start Aerospike Community Edition node
        run: make deps PROFILE=ce

      - name: Run CE integration tests
        run: mix test.integration.ce

      - name: Show Aerospike logs on failure
        if: failure()
        run: |
          docker logs aerospike1 || true

      - name: Stop Aerospike
        if: always()
        run: docker compose down -v

  integration-cluster:
    name: Cluster Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.2"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}-${{ hashFiles('mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Start Aerospike Community Edition cluster
        run: make deps PROFILE=cluster

      - name: Run cluster integration tests
        run: mix test.integration.cluster

      - name: Show Aerospike logs on failure
        if: failure()
        run: |
          docker logs aerospike1 || true
          docker logs aerospike2 || true
          docker logs aerospike3 || true

      - name: Stop Aerospike
        if: always()
        run: docker compose --profile cluster down -v

  integration-enterprise:
    name: Enterprise Integration
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.2"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}-${{ hashFiles('mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Start Aerospike Enterprise profiles
        run: make deps PROFILE=enterprise

      - name: Run enterprise integration tests
        run: mix test.integration.enterprise

      - name: Show Aerospike logs on failure
        if: failure()
        run: |
          docker logs aerospike-ee || true
          docker logs aerospike-ee-tls || true
          docker logs aerospike-ee-pki || true
          docker logs aerospike-ee-security || true
          docker logs aerospike-ee-security-tls || true

      - name: Stop Aerospike
        if: always()
        run: docker compose --profile enterprise down -v
