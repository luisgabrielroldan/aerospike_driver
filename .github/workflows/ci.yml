name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Restore PLT cache
        id: plt-cache
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plt-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Create PLT directory
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mkdir -p priv/plts

      - name: Dialyzer
        run: mix dialyzer --format github

  unit-test:
    name: Unit tests (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "25"
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "27"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Generate TLS fixtures
        run: make tls-fixtures

      - name: Run unit and property tests
        run: mix test --include property

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [unit-test]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Start Aerospike
        run: docker compose up -d

      - name: Wait for Aerospike
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T aerospike asinfo -v status 2>/dev/null | grep -q ok; then
              echo "Aerospike is ready"
              exit 0
            fi
            echo "Waiting for Aerospike... ($i/30)"
            sleep 2
          done
          echo "Aerospike did not start in time"
          exit 1

      - name: Run integration tests
        run: mix test --include integration
        env:
          AEROSPIKE_HOST: localhost
          AEROSPIKE_PORT: 3000

  enterprise-test:
    name: Enterprise tests (SC, TLS, transactions)
    runs-on: ubuntu-latest
    needs: [unit-test]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Generate TLS fixtures
        run: make tls-fixtures

      - name: Start Aerospike Enterprise
        run: docker compose --profile enterprise up -d

      - name: Wait for Aerospike Enterprise
        run: |
          for svc in aerospike1 aerospike-ee aerospike-ee-tls aerospike-ee-pki; do
            echo "Waiting for $svc..."
            for i in $(seq 1 30); do
              if docker exec $svc asinfo -v status 2>/dev/null | grep -q ok; then
                echo "$svc is ready"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "$svc did not start in time"
                docker logs $svc
                exit 1
              fi
              sleep 2
            done
          done

      - name: Verify enterprise roster
        run: |
          ensure_roster() {
            local ctr="$1"
            echo "Checking roster on $ctr..."
            for i in $(seq 1 15); do
              ROSTER=$(docker exec "$ctr" asinfo -v 'roster:namespace=test' 2>/dev/null || true)
              if echo "$ROSTER" | grep -q 'roster=' && ! echo "$ROSTER" | grep -q 'roster=null'; then
                echo "$ctr: roster OK"
                return 0
              fi
              if echo "$ROSTER" | grep -q 'roster=null'; then
                NODE_ID=$(docker exec "$ctr" asinfo -v 'node' 2>/dev/null | tr -d '[:space:]')
                echo "$ctr: roster=null, setting roster -> $NODE_ID"
                docker exec "$ctr" asinfo -v "roster-set:namespace=test;nodes=$NODE_ID" || true
                docker exec "$ctr" asinfo -v 'recluster:' || true
              fi
              sleep 2
            done
            echo "$ctr: roster not ready after 30s"
            docker exec "$ctr" asinfo -v 'roster:namespace=test' || true
            return 1
          }
          ensure_roster aerospike-ee
          ensure_roster aerospike-ee-tls
          ensure_roster aerospike-ee-pki

      - name: Run enterprise and TLS tests
        run: mix test --include enterprise --include tls_stack
        env:
          AEROSPIKE_HOST: localhost
          AEROSPIKE_PORT: 3000

  cluster-test:
    name: Cluster tests (multi-node)
    runs-on: ubuntu-latest
    needs: [unit-test]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Start Aerospike cluster
        run: docker compose --profile cluster up -d

      - name: Wait for cluster formation
        run: |
          for svc in aerospike1 aerospike2 aerospike3; do
            echo "Waiting for $svc..."
            for i in $(seq 1 30); do
              if docker exec $svc asinfo -v status 2>/dev/null | grep -q ok; then
                echo "$svc is ready"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "$svc did not start in time"
                docker logs $svc
                exit 1
              fi
              sleep 2
            done
          done
          echo "Waiting for cluster to stabilize..."
          sleep 10
          CLUSTER_SIZE=$(docker exec aerospike1 asinfo -v 'statistics' | tr ';' '\n' | grep cluster_size | cut -d= -f2)
          echo "Cluster size: $CLUSTER_SIZE"
          if [ "$CLUSTER_SIZE" != "3" ]; then
            echo "Expected cluster size 3, got $CLUSTER_SIZE"
            exit 1
          fi

      - name: Run cluster tests
        run: mix test --include cluster
        env:
          AEROSPIKE_HOST: localhost
          AEROSPIKE_PORT: 3000
