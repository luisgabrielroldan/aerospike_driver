service {
	cluster-name docker-ee-tls
}

logging {
	console {
		context any info
	}
}

network {
	service {
		address any
		port 3000
		tls-address any
		tls-port 4333
		tls-name localhost
		tls-authenticate-client false
	}

	heartbeat {
		mode mesh
		address any
		port 3002
		interval 150
		timeout 10
	}

	fabric {
		address any
		port 3001
	}

	tls localhost {
		cert-file /opt/aerospike/tls/server.crt
		key-file /opt/aerospike/tls/server.key
		ca-file /opt/aerospike/tls/ca.crt
	}
}

namespace test {
	replication-factor 1
	strong-consistency true
	strong-consistency-allow-expunge true
	nsup-period 120
	default-ttl 0

	storage-engine device {
		file /opt/aerospike/data/test.dat
		filesize 4G
		read-page-cache true
	}
}
