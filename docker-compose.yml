services:
  aerospike:
    image: aerospike/aerospike-server:latest
    container_name: aerospike1
    hostname: aerospike1
    ports:
      - "3000:3000" # client protocol
      - "3001:3001" # fabric
      - "3002:3002" # heartbeat (clustering)
    volumes:
      - ./docker/aerospike.conf:/opt/aerospike/aerospike.conf
    command: ["--config-file", "/opt/aerospike/aerospike.conf"]
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  aerospike2:
    image: aerospike/aerospike-server:latest
    container_name: aerospike2
    hostname: aerospike2
    profiles: [cluster]
    ports:
      - "3010:3000"
      - "3011:3001"
      - "3012:3002"
    volumes:
      - ./docker/aerospike.conf:/opt/aerospike/aerospike.conf
    command: ["--config-file", "/opt/aerospike/aerospike.conf"]
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  aerospike3:
    image: aerospike/aerospike-server:latest
    container_name: aerospike3
    hostname: aerospike3
    profiles: [cluster]
    ports:
      - "3020:3000"
      - "3021:3001"
      - "3022:3002"
    volumes:
      - ./docker/aerospike.conf:/opt/aerospike/aerospike.conf
    command: ["--config-file", "/opt/aerospike/aerospike.conf"]
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  aerospike-ee:
    image: aerospike/aerospike-server-enterprise:latest
    container_name: aerospike-ee
    hostname: aerospike-ee
    profiles: [enterprise]
    ports:
      - "3100:3000" # client protocol
      - "3101:3001" # fabric
      - "3102:3002" # heartbeat
    volumes:
      - ./docker/aerospike-enterprise.conf:/opt/aerospike/aerospike.conf
      - ./docker/entrypoint-ee.sh:/usr/local/bin/entrypoint-ee.sh:ro
    entrypoint: ["/usr/local/bin/entrypoint-ee.sh"]
    command: ["/opt/aerospike/aerospike.conf"]
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  aerospike-ee-tls:
    image: aerospike/aerospike-server-enterprise:latest
    container_name: aerospike-ee-tls
    hostname: aerospike-ee-tls
    profiles: [enterprise]
    ports:
      - "4333:4333" # TLS client protocol
      - "3111:3001" # fabric
      - "3112:3002" # heartbeat
    volumes:
      - ./docker/aerospike-enterprise-tls.conf:/opt/aerospike/aerospike.conf
      - ./test/support/fixtures/tls:/opt/aerospike/tls:ro
      - ./docker/entrypoint-ee.sh:/usr/local/bin/entrypoint-ee.sh:ro
    entrypoint: ["/usr/local/bin/entrypoint-ee.sh"]
    command: ["/opt/aerospike/aerospike.conf"]
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  aerospike-ee-pki:
    image: aerospike/aerospike-server-enterprise:latest
    container_name: aerospike-ee-pki
    hostname: aerospike-ee-pki
    profiles: [enterprise]
    ports:
      - "4334:4334" # TLS+mTLS client protocol
      - "3121:3001" # fabric
      - "3122:3002" # heartbeat
    volumes:
      - ./docker/aerospike-enterprise-pki.conf:/opt/aerospike/aerospike.conf
      - ./test/support/fixtures/tls:/opt/aerospike/tls:ro
      - ./docker/entrypoint-ee.sh:/usr/local/bin/entrypoint-ee.sh:ro
    entrypoint: ["/usr/local/bin/entrypoint-ee.sh"]
    command: ["/opt/aerospike/aerospike.conf"]
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
